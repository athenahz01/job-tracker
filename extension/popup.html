<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Tracker</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header class="popup-header">
        <span class="brand-glyph" aria-hidden="true">JT</span>
        <div>
          <p class="eyebrow">Job Tracker</p>
          <h1>Save this job for later</h1>
        </div>
      </header>

      <p id="settings-message" class="notice" hidden>
        Add your API URL and shared secret in options first.
      </p>

      <section id="detected-card" class="detected-card" hidden aria-live="polite"></section>

      <div class="action-stack">
        <button id="save-current" type="button">Review current page</button>
        <div class="action-row">
          <button id="check-fit" class="secondary" type="button">Check fit</button>
          <button id="autofill-application" class="secondary" type="button">Autofill</button>
        </div>
      </div>

      <section id="fit-result" class="fit-result" hidden aria-live="polite"></section>
      <section id="autofill-result" class="autofill-result" hidden aria-live="polite"></section>

      <form id="manual-form" hidden>
        <label>
          Company
          <input id="company" name="company" autocomplete="organization" required />
        </label>
        <label>
          Role
          <input id="role" name="role" autocomplete="off" />
        </label>
        <label>
          Location
          <input id="location" name="location" autocomplete="off" />
        </label>
        <label>
          Salary
          <input id="salary" name="salary" autocomplete="off" />
        </label>
        <label>
          Tags
          <input id="tags" name="tags" autocomplete="off" placeholder="remote, ai, referral" />
        </label>
        <button id="submit-capture" type="submit">Save for later</button>
      </form>

      <p id="status" class="status" role="status"></p>

      <footer class="popup-footer">
        <button id="open-options" class="link-button" type="button">Options</button>
      </footer>
    </main>
    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
